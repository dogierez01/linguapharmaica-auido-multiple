<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erez Academy - Listening Practice</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .app-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            align-items: center;
        }
        #listen-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 25px;
            font-size: 1.4rem;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 40px;
            transition: all 0.2s;
        }
        #listen-btn:hover { background-color: #34495e; }
        #listen-btn:active { transform: scale(0.98); }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .choice-btn {
            background-color: #ffffff;
            border: 2px solid #e0e0e0;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #444;
            text-align: left;
        }
        .choice-btn:hover { border-color: #3498db; background-color: #f0f7ff; }
        #feedback-area { margin-top: 25px; font-weight: 600; min-height: 30px; }
        .score-box { font-size: 1.2rem; font-weight: bold; color: #27ae60; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .q-counter { color: #999; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <select id="lesson-picker" onchange="changeLesson()"></select>
            <div class="score-box">Score: <span id="score-val">0</span></div>
        </div>

        <button id="listen-btn" onclick="playAudio()">🔊 LISTEN</button>

        <div id="choices-grid" class="options-list"></div>

        <div id="feedback-area"></div>

        <div class="q-counter" id="q-counter">Question 1 / 20</div>
        <audio id="audio-engine"></audio>
    </div>

    <script src="app.js"></script>
</body>
</html>
