<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erez Academy - Listening Mastery</title>
    <style>
        /* --- DARK THEME & NEON COLORS --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #0b0f19; /* Deep dark background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            background: #151b2b; /* Slightly lighter dark card */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15); /* Cyan glow */
            border: 1px solid rgba(0, 255, 255, 0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            align-items: center;
        }
        
        /* Neon Select Dropdown */
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.5);
            background: #0b0f19;
            color: #00ffff;
            font-weight: bold;
            outline: none;
        }

        /* Neon Listen Button */
        #listen-btn {
            background-color: transparent;
            color: #00ffff; /* Cyan text */
            border: 2px solid #00ffff;
            padding: 25px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 30px;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        #listen-btn:hover { 
            background-color: #00ffff; 
            color: #000000;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.8); 
        }
        #listen-btn:active { transform: scale(0.98); }
        
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Neon Choice Buttons */
        .choice-btn {
            background-color: #1c2438;
            border: 2px solid #2a3553;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #ffffff;
            text-align: left;
            width: 100%;
        }
        .choice-btn:hover:not(:disabled) {
            border-color: #ff00ff; /* Magenta glow on hover */
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
            background-color: rgba(255, 0, 255, 0.05);
        }

        #feedback-area {
            margin-top: 25px;
            font-weight: 600;
            min-height: 30px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .score-box {
            font-size: 1.2rem;
            font-weight: bold;
            color: #39ff14; /* Neon green */
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }
        .q-counter {
            color: #8892b0;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        /* --- DARK THEME CELEBRATION MODAL --- */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #151b2b;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ff00ff; /* Magenta border */
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.4);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            width: 90%;
            max-width: 400px;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .fireworks {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }
        #modal-title { 
            color: #00ffff; 
            margin-bottom: 10px; 
            font-size: 1.8rem; 
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
        }
        #modal-text { 
            color: #c9d1d9; 
            font-size: 1.1rem; 
            margin-bottom: 25px; 
        }
        #next-lesson-btn {
            background-color: transparent;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            width: 100%;
        }
        #next-lesson-btn:hover { 
            background-color: #39ff14; 
            color: #000;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.8); 
            transform: translateY(-2px); 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <select id="lesson-picker" onchange="changeLesson()"></select>
            <div class="score-box">Score: <span id="score-val">0</span></div>
        </div>

        <button id="listen-btn" onclick="playAudio()">🔊 LISTEN</button>

        <div id="choices-grid" class="options-list"></div>

        <div id="feedback-area"></div>

        <div class="q-counter" id="q-counter">Question 1 / 20</div>
        <audio id="audio-engine"></audio>
    </div>

    <div id="celebration-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="fireworks">🎆🎉✨</div>
            <h2 id="modal-title">Lesson Finished!</h2>
            <p id="modal-text">Are you ready for the next one?</p>
            <button id="next-lesson-btn">Start Next Lesson 🚀</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
