<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erez Academy - Listening Mastery</title>
    <style>
        /* --- TRUE NEON DARK THEME --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #05050a; /* Pitch black/dark blue */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            background: #0f111a; 
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00ffff; /* Neon Cyan Border */
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3); /* Cyan Glow */
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            align-items: center;
        }
        
        /* NEON YELLOW Select Dropdown */
        select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #e6ff00; /* Neon Yellow Border */
            background: #05050a;
            color: #e6ff00; /* Neon Yellow Text */
            font-weight: bold;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 0 12px rgba(230, 255, 0, 0.3);
            cursor: pointer;
        }
        select option {
            background: #0f111a;
            color: #e6ff00;
        }

        /* NEON LISTEN BUTTON */
        #listen-btn {
            background-color: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 30px;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5), inset 0 0 10px rgba(0, 255, 255, 0.3);
            text-shadow: 0 0 8px #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #listen-btn:hover { 
            background-color: #00ffff; 
            color: #000000;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8), inset 0 0 15px rgba(0, 255, 255, 0.8); 
            text-shadow: none;
        }
        #listen-btn:active { transform: scale(0.96); }
        
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* NEON CHOICE BUTTONS */
        .choice-btn {
            background-color: #0f111a;
            border: 2px solid #ff00ff; /* Neon Magenta */
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #ff00ff;
            text-align: left;
            width: 100%;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
            text-shadow: 0 0 5px rgba(255, 0, 255, 0.5);
        }
        .choice-btn:hover:not(:disabled) {
            background-color: #ff00ff;
            color: #000000;
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.7);
            text-shadow: none;
        }

        #feedback-area {
            margin-top: 25px;
            font-weight: 700;
            min-height: 30px;
            font-size: 1.4rem;
        }
        .score-box {
            font-size: 1.3rem;
            font-weight: bold;
            color: #39ff14; /* Neon green */
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.7);
        }
        .q-counter {
            color: #00ffff;
            font-size: 0.9rem;
            margin-top: 15px;
            opacity: 0.7;
        }

        /* --- FIREWORKS CELEBRATION MODAL --- */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0f111a;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #39ff14; /* Neon Green Border */
            box-shadow: 0 0 40px rgba(57, 255, 20, 0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            width: 90%;
            max-width: 400px;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .fireworks {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }
        #modal-title { 
            color: #39ff14; 
            margin-bottom: 10px; 
            font-size: 2rem; 
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
        }
        #modal-text { 
            color: #ffffff; 
            font-size: 1.2rem; 
            margin-bottom: 25px; 
        }
        #next-lesson-btn {
            background-color: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 15px 30px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            width: 100%;
        }
        #next-lesson-btn:hover { 
            background-color: #00ffff; 
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8); 
            transform: translateY(-2px); 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <select id="lesson-picker" onchange="changeLesson()"></select>
            <div class="score-box">Score: <span id="score-val">0</span></div>
        </div>

        <button id="listen-btn" onclick="playAudio()">🔊 LISTEN 🇹🇷</button>

        <div id="choices-grid" class="options-list"></div>

        <div id="feedback-area"></div>

        <div class="q-counter" id="q-counter">Question 1 / 20</div>
        <audio id="audio-engine"></audio>
    </div>

    <div id="celebration-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="fireworks">🎆🎉✨</div>
            <h2 id="modal-title">Lesson Finished!</h2>
            <p id="modal-text">Are you ready for the next one?</p>
            <button id="next-lesson-btn">Start Next Lesson 🚀</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
