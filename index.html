<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erez Academy - Turkish Listening Mastery</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #0b0c10; /* Deep dark background */
            color: #c5c6c7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            background: #1f2833; /* Slightly lighter dark container */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.15); /* Soft neon cyan glow */
            border: 1px solid #45a29e;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            align-items: center;
        }
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #66fcf1;
            background-color: #0b0c10;
            color: #66fcf1;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }
        .score-box {
            font-size: 1.2rem;
            font-weight: bold;
            color: #66fcf1; /* Neon cyan */
            text-shadow: 0 0 8px rgba(102, 252, 241, 0.6);
        }
        #listen-btn {
            background-color: transparent;
            color: #66fcf1;
            border: 2px solid #66fcf1;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 30px;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.3), inset 0 0 10px rgba(102, 252, 241, 0.3);
        }
        #listen-btn:hover {
            background-color: #66fcf1;
            color: #0b0c10;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.8);
        }
        #listen-btn:active { transform: scale(0.98); }
        
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .choice-btn {
            background-color: #0b0c10;
            border: 2px solid #45a29e;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #e0e2e4;
            text-align: left;
            width: 100%;
        }
        .choice-btn:hover:not(:disabled) {
            border-color: #66fcf1;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
            transform: translateY(-2px);
        }
        .choice-btn:disabled {
            cursor: not-allowed;
        }
        
        #feedback-area {
            margin-top: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 30px;
        }
        .q-counter {
            color: #888;
            font-size: 0.9rem;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .footer-flag {
            font-size: 2.5rem;
            margin-top: 15px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <select id="lesson-picker" onchange="changeLesson()"></select>
            <div class="score-box">Score: <span id="score-val">0</span></div>
        </div>

        <button id="listen-btn" onclick="playAudio()">🔊 LISTEN TO TURKISH</button>

        <div id="choices-grid" class="options-list"></div>

        <div id="feedback-area"></div>

        <div class="q-counter" id="q-counter">Question 1 / 20</div>
        
        <div class="footer-flag">🇹🇷</div>
        
        <audio id="audio-engine"></audio>
    </div>

    <script src="app.js"></script>
</body>
</html>
